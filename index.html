<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Covid Sites</title>
<meta name="description" content="A collection of websites documenting Covid-19 vaccine issues, regulatory oversight, and the people impacted.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #faf8f4;
    --card: #ffffff;
    --ink: #1c1b18;
    --muted: #5f5b54;
    --line: #e7e2d8;
    --accent: #7c2d2d;
    --accent-soft: #f3e9e6;
    --shadow: 0 1px 2px rgba(28,27,24,.04), 0 8px 24px rgba(28,27,24,.06);
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Inter", system-ui, -apple-system, sans-serif;
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
  }
  .wrap { max-width: 1080px; margin: 0 auto; padding: 0 24px; }

  header.site {
    padding: 72px 0 36px;
    border-bottom: 1px solid var(--line);
  }
  .eyebrow {
    font-size: .8rem; letter-spacing: .14em; text-transform: uppercase;
    color: var(--accent); font-weight: 600; margin: 0 0 14px;
  }
  h1 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600;
    font-size: clamp(2.4rem, 6vw, 3.6rem);
    line-height: 1.05;
    letter-spacing: -.015em;
    margin: 0 0 18px;
  }
  .lede {
    font-size: 1.15rem; color: var(--muted); max-width: 60ch; margin: 0;
  }

  .toolbar {
    display: flex; flex-wrap: wrap; gap: 12px; align-items: center;
    margin: 28px 0 4px;
  }
  #search {
    flex: 1 1 260px;
    font: inherit; font-size: 1rem;
    padding: 12px 16px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    color: var(--ink);
  }
  #search:focus { outline: 2px solid var(--accent); outline-offset: 1px; border-color: transparent; }
  .count { color: var(--muted); font-size: .9rem; white-space: nowrap; }

  .seg {
    display: inline-flex; flex: 0 0 auto;
    border: 1px solid var(--line); border-radius: 10px;
    overflow: hidden; background: var(--card);
  }
  .seg button {
    font: inherit; font-size: .92rem; font-weight: 500;
    padding: 11px 18px; border: 0; background: transparent;
    color: var(--muted); cursor: pointer; transition: background .12s ease, color .12s ease;
  }
  .seg button + button { border-left: 1px solid var(--line); }
  .seg button[aria-pressed="true"] { background: var(--accent); color: #fff; }
  .seg button:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }

  main { padding: 36px 0 0; }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 22px;
    margin: 0 0 48px;
  }
  .card {
    position: relative;
    display: flex; flex-direction: column;
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 26px 26px 22px;
    box-shadow: var(--shadow);
    transition: transform .15s ease, box-shadow .15s ease, border-color .15s ease;
  }
  .card:hover { transform: translateY(-3px); border-color: #d8d0c2; box-shadow: 0 2px 4px rgba(28,27,24,.05), 0 16px 36px rgba(28,27,24,.10); }
  .card h2 {
    font-family: "Fraunces", Georgia, serif;
    font-weight: 600; font-size: 1.35rem; line-height: 1.2;
    margin: 0 0 6px;
  }
  .card h2 a { color: var(--ink); text-decoration: none; }
  .card h2 a::after { content: ""; position: absolute; inset: 0; }
  .card:hover h2 a { color: var(--accent); }
  .host {
    font-size: .85rem; color: var(--accent); font-weight: 500;
    margin: 0 0 14px; word-break: break-word;
  }
  .card p.desc { color: var(--muted); font-size: .96rem; margin: 0 0 18px; }
  .tags { display: flex; flex-wrap: wrap; gap: 7px; margin-top: auto; }
  .tag {
    font-size: .72rem; letter-spacing: .02em;
    background: var(--accent-soft); color: var(--accent);
    padding: 4px 10px; border-radius: 999px; white-space: nowrap;
  }

  .empty, .loading { color: var(--muted); padding: 40px 0; font-size: 1.05rem; }
  .error { color: var(--accent); }

  footer.site {
    border-top: 1px solid var(--line);
    padding: 32px 0 60px;
    color: var(--muted); font-size: .9rem;
  }
  footer.site a { color: var(--accent); }

  @media (max-width: 520px) {
    header.site { padding: 48px 0 28px; }
    .grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>
  <header class="site">
    <div class="wrap">
      <p class="eyebrow">Created by Marjorie Roswell</p>
      <h1 id="page-title">My Covid Sites</h1>
      <p class="lede" id="page-tagline"></p>
      <div class="toolbar">
        <input id="search" type="search" placeholder="Search sites and topics…" aria-label="Search sites and topics">
        <div class="seg" role="group" aria-label="Detail level">
          <button id="mode-short" type="button" aria-pressed="true">Short</button>
          <button id="mode-detailed" type="button" aria-pressed="false">Detailed</button>
        </div>
        <span class="count" id="count" aria-live="polite"></span>
      </div>
    </div>
  </header>

  <main>
    <div class="wrap">
      <div id="grid" class="grid" aria-live="polite"></div>
      <p id="status" class="loading">Loading…</p>
    </div>
  </main>

<script>
  const grid = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const searchEl = document.getElementById('search');
  const countEl = document.getElementById('count');
  const btnShort = document.getElementById('mode-short');
  const btnDetailed = document.getElementById('mode-detailed');
  let allSites = [];
  let mode = localStorage.getItem('mcs-mode') === 'detailed' ? 'detailed' : 'short';

  function hostname(url) {
    try { return new URL(url).hostname.replace(/^www\./, ''); }
    catch { return url; }
  }
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function currentFiltered() {
    const q = searchEl.value.trim().toLowerCase();
    if (!q) return allSites;
    return allSites.filter(s =>
      (s.title + ' ' + (s.short||'') + ' ' + s.description + ' ' + (s.tags||[]).join(' ') + ' ' + s.url)
        .toLowerCase().includes(q));
  }

  function render() {
    const sites = currentFiltered();
    const detailed = mode === 'detailed';
    grid.innerHTML = sites.map(s => {
      const desc = detailed ? s.description : (s.short || s.description);
      const tags = detailed
        ? `<div class="tags">${(s.tags||[]).map(t => `<span class="tag">${esc(t)}</span>`).join('')}</div>`
        : '';
      return `
      <article class="card">
        <h2><a href="${esc(s.url)}" target="_blank" rel="noopener">${esc(s.title)}</a></h2>
        <p class="host">${esc(s.display || hostname(s.url))}</p>
        <p class="desc">${esc(desc)}</p>
        ${tags}
      </article>`;
    }).join('');
    countEl.textContent = sites.length === allSites.length
      ? `${sites.length} sites`
      : `${sites.length} of ${allSites.length}`;
    statusEl.style.display = sites.length ? 'none' : 'block';
    if (!sites.length) { statusEl.className = 'empty'; statusEl.textContent = 'No sites match your search.'; }
  }

  function setMode(next) {
    mode = next;
    localStorage.setItem('mcs-mode', mode);
    btnShort.setAttribute('aria-pressed', String(mode === 'short'));
    btnDetailed.setAttribute('aria-pressed', String(mode === 'detailed'));
    render();
  }

  searchEl.addEventListener('input', render);
  btnShort.addEventListener('click', () => setMode('short'));
  btnDetailed.addEventListener('click', () => setMode('detailed'));

  fetch('sites.json')
    .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
    .then(data => {
      if (data.meta) {
        if (data.meta.title) { document.title = data.meta.title; document.getElementById('page-title').textContent = data.meta.title; }
        if (data.meta.tagline) document.getElementById('page-tagline').textContent = data.meta.tagline;
      }
      allSites = data.sites || [];
      setMode(mode);
    })
    .catch(err => {
      statusEl.className = 'loading error';
      statusEl.innerHTML = 'Could not load <code>sites.json</code>. If you opened this file directly, run a local server (e.g. <code>python3 -m http.server 8731</code>) or view it via GitHub Pages.';
    });
</script>
</body>
</html>
